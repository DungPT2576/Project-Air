<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirSense - Hệ Thống Quan Trắc Không Khí</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --border: #334155;
            
            /* Màu cảnh báo chuẩn IQAir */
            --aqi-good: #10b981;
            --aqi-mod: #f59e0b;
            --aqi-unhealthy-sub: #f97316;
            --aqi-bad: #ef4444;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 24px;
        }

        .dashboard {
            max-width: 1280px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* Top Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 16px;
        }
        .header h1 { margin: 0; font-size: 24px; font-weight: 600; letter-spacing: -0.5px; }
        .status-badge { padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: 500; background: #334155; color: var(--text-sub); }

        /* Khối tổng quan kiểu IQAir */
        .main-overview {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 24px;
        }

        @media (max-width: 768px) {
            .main-overview { grid-template-columns: 1fr; }
        }

        .aqi-banner {
            border-radius: 16px;
            padding: 32px;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: all 0.5s ease;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }
        .aqi-value { font-size: 64px; font-weight: 800; line-height: 1; margin: 12px 0; }
        .aqi-label { font-size: 20px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .aqi-desc { font-size: 14px; opacity: 0.9; margin-top: 8px; }

        /* Lưới thẻ chỉ số phụ */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        .stat-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .stat-title { font-size: 14px; color: var(--text-sub); font-weight: 500; }
        .stat-value { font-size: 28px; font-weight: 700; margin-top: 8px; color: var(--text-main); }
        .stat-unit { font-size: 14px; color: var(--text-sub); font-weight: 400; }

        /* Đồ thị */
        .charts-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 20px;
        }
        .chart-container {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            height: 260px;
        }

        /* Lịch sử dạng Timeline */
        .history-section {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
        }
        .history-section h3 { margin: 0 0 16px 0; font-size: 16px; font-weight: 600; color: var(--text-sub); }
        .timeline-scroll { overflow-x: auto; display: flex; gap: 12px; padding-bottom: 8px; }
        .timeline-card {
            background: var(--bg-main);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 16px;
            min-width: 110px;
            flex-shrink: 0;
            text-align: center;
        }
        .tl-time { font-weight: 600; font-size: 14px; color: var(--text-main); }
        .tl-date { font-size: 11px; color: var(--text-sub); margin-bottom: 6px; }
        .tl-param { font-size: 12px; margin-top: 4px; font-weight: 500; }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="header">
            <h1>AirSense // Trạm Quan Trắc Đô Thị</h1>
            <div class="status-badge" id="status">Đang kết nối mạng...</div>
        </div>

        <div class="main-overview">
            <div class="aqi-banner" id="aqi-card" style="background-color: var(--border);">
                <div class="aqi-label" id="aqi-status">Đang tải</div>
                <div class="aqi-value" id="aqi-num">--</div>
                <div class="aqi-desc" id="aqi-advice">Đang phân tích chất lượng không khí tại trạm...</div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-title">Bụi mịn PM2.5</div>
                    <div class="stat-value" id="val-pm25">-- <span class="stat-unit">µg/m³</span></div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">Bụi thô PM10</div>
                    <div class="stat-value" id="val-pm10">-- <span class="stat-unit">µg/m³</span></div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">Nhiệt độ môi trường</div>
                    <div class="stat-value" id="val-temp" style="color: #ffeb3b;">-- <span class="stat-unit">°C</span></div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">Độ ẩm tương đối</div>
                    <div class="stat-value" id="val-hum" style="color: #00e5ff;">-- <span class="stat-unit">%</span></div>
                </div>
            </div>
        </div>

        <div class="charts-section">
            <div class="chart-container"><canvas id="pmChart"></canvas></div>
            <div class="chart-container"><canvas id="tempChart"></canvas></div>
            <div class="chart-container"><canvas id="humChart"></canvas></div>
        </div>

        <div class="history-section">
            <h3>⏱️ Dữ liệu đo cuốn chiếu (8 mốc gần nhất)</h3>
            <div class="timeline-scroll" id="timeline">
                </div>
        </div>
    </div>

    <script>
        // Thiết lập phông nền mặc định cho Chart.js phẳng, mượt
        Chart.defaults.color = '#94a3b8';
        Chart.defaults.borderColor = 'rgba(51, 65, 85, 0.5)';

        // Khởi tạo đồ thị
        const pmChart = new Chart(document.getElementById('pmChart').getContext('2d'), { type: 'line', data: { labels: [], datasets: [{ label: 'PM2.5', data: [], borderColor: '#ff5252', backgroundColor: 'rgba(255, 82, 82, 0.05)', tension: 0.4, fill: true }, { label: 'PM10', data: [], borderColor: '#ff9800', backgroundColor: 'rgba(255, 152, 0, 0.05)', tension: 0.4, fill: true }]}, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top' } } } });
        const tempChart = new Chart(document.getElementById('tempChart').getContext('2d'), { type: 'line', data: { labels: [], datasets: [{ label: 'Nhiệt độ (°C)', data: [], borderColor: '#ffeb3b', backgroundColor: 'transparent', tension: 0.4 }]}, options: { responsive: true, maintainAspectRatio: false } });
        const humChart = new Chart(document.getElementById('humChart').getContext('2d'), { type: 'line', data: { labels: [], datasets: [{ label: 'Độ ẩm (%)', data: [], borderColor: '#00e5ff', backgroundColor: 'transparent', tension: 0.4 }]}, options: { responsive: true, maintainAspectRatio: false } });

        let dataHistory = [];
        const timeline = document.getElementById('timeline');
        const statusText = document.getElementById('status');

        // Hàm phân tích chỉ số và đổi màu Banner theo chuẩn Hoa Kỳ (US AQI) áp dụng trên các web lớn
        void function updateAQIBanner(pm25) {
            const card = document.getElementById('aqi-card');
            const status = document.getElementById('aqi-status');
            const num = document.getElementById('aqi-num');
            const advice = document.getElementById('aqi-advice');

            if (!pm25 && pm25 !== 0) return;

            num.innerText = Math.round(pm25); // Mô phỏng điểm số AQI tương đương nồng độ bụi

            if (pm25 <= 12.0) {
                card.style.backgroundColor = 'var(--aqi-good)';
                status.innerText = 'Tốt (Good)';
                advice.innerText = 'Không khí trong lành. Thích hợp cho mọi hoạt động ngoài trời.';
            } else if (pm25 <= 35.4) {
                card.style.backgroundColor = 'var(--aqi-mod)';
                status.innerText = 'Trung bình (Moderate)';
                advice.innerText = 'Nhóm nhạy cảm nên hạn chế vận động mạnh ngoài trời trong thời gian dài.';
            } else if (pm25 <= 55.4) {
                card.style.backgroundColor = 'var(--aqi-unhealthy-sub)';
                status.innerText = 'Kém (Unhealthy)';
                advice.innerText = 'Nhóm nhạy cảm có thể chịu ảnh hưởng sức khỏe. Nên đeo khẩu trang.';
            } else {
                card.style.backgroundColor = 'var(--aqi-bad)';
                status.innerText = 'Nguy hại (Hazardous)';
                advice.innerText = 'Cảnh báo sức khỏe nghiêm trọng. Mọi người nên đóng cửa sổ và ở trong nhà.';
            }
        }(null);

        // Đổ dữ liệu lên toàn bộ giao diện
        function renderUI() {
            if (dataHistory.length === 0) return;
            
            const latest = dataHistory[dataHistory.length - 1];
            
            // 1. Cập nhật các ô số liệu tức thời
            document.getElementById('val-pm25').innerHTML = `${latest.pm25.toFixed(1)} <span class="stat-unit">µg/m³</span>`;
            document.getElementById('val-pm10').innerHTML = `${latest.pm10.toFixed(1)} <span class="stat-unit">µg/m³</span>`;
            document.getElementById('val-temp').innerHTML = `${latest.temp.toFixed(1)} <span class="stat-unit">°C</span>`;
            document.getElementById('val-hum').innerHTML = `${latest.hum.toFixed(1)} <span class="stat-unit">%</span>`;
            
            // Cập nhật banner thông minh
            const card = document.getElementById('aqi-card');
            const status = document.getElementById('aqi-status');
            const num = document.getElementById('aqi-num');
            const advice = document.getElementById('aqi-advice');
            const p25 = latest.pm25;
            num.innerText = Math.round(p25);
            if (p25 <= 12.0) { card.style.backgroundColor = 'var(--aqi-good)'; status.innerText = 'Tốt (Good)'; advice.innerText = 'Không khí trong lành. Thích hợp cho mọi hoạt động ngoài trời.'; }
            else if (p25 <= 35.4) { card.style.backgroundColor = 'var(--aqi-mod)'; status.innerText = 'Khá (Moderate)'; advice.innerText = 'Nhóm nhạy cảm nên cân nhắc giảm bớt thời gian vận động ngoài trời.'; }
            else if (p25 <= 55.4) { card.style.backgroundColor = 'var(--aqi-unhealthy-sub)'; status.innerText = 'Kém (Kém)'; advice.innerText = 'Chỉ số không khí suy giảm. Người dân nên trang bị khẩu trang chống bụi mịn.'; }
            else { card.style.backgroundColor = 'var(--aqi-bad)'; status.innerText = 'Xấu (Unhealthy)'; advice.innerText = 'Bắt đầu ảnh hưởng xấu tới sức khỏe cộng đồng. Hạn chế ra đường.'; }

            // 2. Cập nhật các trục đồ thị xu hướng
            const labels = dataHistory.map(d => (d.timeLabel || "").substring(0, 5));
            pmChart.data.labels = labels; pmChart.data.datasets[0].data = dataHistory.map(d => d.pm25); pmChart.data.datasets[1].data = dataHistory.map(d => d.pm10); pmChart.update();
            tempChart.data.labels = labels; tempChart.data.datasets[0].data = dataHistory.map(d => d.temp); tempChart.update();
            humChart.data.labels = labels; humChart.data.datasets[0].data = dataHistory.map(d => d.hum); humChart.update();

            // 3. Xây dựng luồng lịch sử Timeline nằm ngang phía dưới
            timeline.innerHTML = '';
            const recent = dataHistory.slice(-8);
            recent.forEach((item, index) => {
                let displayTime = (index === recent.length - 1) ? "Bây giờ" : (item.timeLabel || "").substring(0, 5);
                const div = document.createElement('div');
                div.className = 'timeline-card';
                div.innerHTML = `
                    <div class="tl-time">${displayTime}</div>
                    <div class="tl-date">${item.dateLabel || ""}</div>
                    <div class="tl-param" style="color: #ff5252;">🌫️ ${Math.round(item.pm25)}</div>
                    <div class="tl-param" style="color: #ffeb3b;">🌡️ ${Math.round(item.temp)}°</div>
                `;
                timeline.appendChild(div);
            });
        }

        // Bước A: Kéo dữ liệu quá khứ lưu đệm trên Server Render
        async function loadHistory() {
            try {
                const response = await fetch('/api/data');
                const history = await response.json();
                if (history && history.length > 0) {
                    dataHistory = history;
                    renderUI();
                }
            } catch (e) { console.error("Lỗi đồng bộ API lịch sử:", e); }
        }

        // Bước B: Đăng ký lắng nghe kênh dữ liệu trực tiếp thời gian thực qua MQTT WebSockets
        const mqttClient = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
        const myTopicUI = 'airsense/hust/tiendung_2507'; 

        mqttClient.on('connect', () => {
            statusText.innerText = "Trạng thái trực tuyến: MQTT Real-time 🟢";
            statusText.style.color = "#4caf50";
            mqttClient.subscribe(myTopicUI);
        });

        mqttClient.on('message', (topic, message) => {
            const payload = JSON.parse(message.toString());
            const now = new Date();
            
            payload.timeLabel = now.toLocaleTimeString('vi-VN', { hour12: false });
            payload.dateLabel = `${now.getDate()}/${now.getMonth() + 1}`;
            
            dataHistory.push(payload);
            if (dataHistory.length > 50) dataHistory.shift(); 
            renderUI();
        });

        loadHistory();
    </script>
</body>
</html>
