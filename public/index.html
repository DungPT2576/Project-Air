<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirSense Dashboard - Trạm Quan Trắc</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        /* GIỮ NGUYÊN CSS CŨ CỦA BẠN VÀO ĐÂY */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #18191a; color: #e4e6eb; margin: 0; padding: 20px; }
        .dashboard-container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .chart-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .chart-card { background-color: #242526; padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); height: 300px; }
        .timeline-wrapper { background-color: #242526; padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); overflow-x: auto; white-space: nowrap; }
        .timeline-container { display: flex; gap: 15px; }
        .timeline-item { background: #3a3b3c; padding: 10px 15px; border-radius: 8px; min-width: 120px; display: inline-block; }
        .t-time-box { border-bottom: 1px solid #555; padding-bottom: 5px; margin-bottom: 8px; }
        .t-time { font-weight: bold; font-size: 1.1em; color: #fff; }
        .t-date { font-size: 0.8em; color: #aaa; }
        .t-temp { color: #ffeb3b; margin-bottom: 5px; }
        .t-hum { color: #00e5ff; }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <h2>🌍 HỆ THỐNG QUAN TRẮC MÔI TRƯỜNG IOT</h2>
            <p style="color: #4caf50;" id="connection-status">Trạng thái: Đang kết nối...</p>
        </div>

        <div class="chart-grid">
            <div class="chart-card"><canvas id="pmChart"></canvas></div>
            <div class="chart-card"><canvas id="tempChart"></canvas></div>
            <div class="chart-card"><canvas id="humChart"></canvas></div>
        </div>

        <div class="timeline-wrapper">
            <h3>⏱️ Luồng dữ liệu gần nhất</h3>
            <div class="timeline-container" id="timeline-container">
                </div>
        </div>
    </div>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script>
        // CẤU HÌNH MÀU SẮC MẶC ĐỊNH CHO BIỂU ĐỒ CHART.JS
        Chart.defaults.color = '#b0b3b8';
        Chart.defaults.borderColor = '#3a3f4a';

        const pmCtx = document.getElementById('pmChart').getContext('2d');
        const pmChart = new Chart(pmCtx, {
            type: 'line',
            data: { labels: [], datasets: [
                { label: 'PM2.5', data: [], borderColor: '#ff5252', backgroundColor: 'rgba(255, 82, 82, 0.1)', tension: 0.3, fill: true },
                { label: 'PM10', data: [], borderColor: '#ff9800', backgroundColor: 'rgba(255, 152, 0, 0.1)', tension: 0.3, fill: true }
            ]},
            options: { responsive: true, maintainAspectRatio: false }
        });

        const tempCtx = document.getElementById('tempChart').getContext('2d');
        const tempChart = new Chart(tempCtx, {
            type: 'line',
            data: { labels: [], datasets: [
                { label: 'Nhiệt độ (°C)', data: [], borderColor: '#ffeb3b', backgroundColor: 'rgba(255, 235, 59, 0.1)', tension: 0.4, fill: true }
            ]},
            options: { responsive: true, maintainAspectRatio: false }
        });

        const humCtx = document.getElementById('humChart').getContext('2d');
        const humChart = new Chart(humCtx, {
            type: 'line',
            data: { labels: [], datasets: [
                { label: 'Độ ẩm (%)', data: [], borderColor: '#00e5ff', backgroundColor: 'rgba(0, 229, 255, 0.1)', tension: 0.4, fill: true }
            ]},
            options: { responsive: true, maintainAspectRatio: false }
        });

        async function fetchData() {
            try {
                const response = await fetch('/api/data');
                const data = await response.json();
                
                if (data.length > 0) {
                    // Cập nhật biểu đồ (Vẫn giữ Giờ:Phút cho gọn trên trục X biểu đồ)
                    const labels = data.map(d => {
                        let match = d.timestamp.match(/\d{1,2}:\d{2}/);
                        return match ? match[0] : d.timestamp;
                    });

                    pmChart.data.labels = labels;
                    pmChart.data.datasets[0].data = data.map(d => d.pm25);
                    pmChart.data.datasets[1].data = data.map(d => d.pm10);
                    pmChart.update();

                    tempChart.data.labels = labels;
                    tempChart.data.datasets[0].data = data.map(d => d.temp);
                    tempChart.update();

                    humChart.data.labels = labels;
                    humChart.data.datasets[0].data = data.map(d => d.hum);
                    humChart.update();

                    const timelineContainer = document.getElementById('timeline-container');
                    timelineContainer.innerHTML = ''; 

                    const recentData = data.slice(-8); 
                    
                    recentData.forEach((item, index) => {
                        // TÁCH GIỜ:PHÚT:GIÂY VÀ NGÀY/THÁNG
                        let timeMatch = item.timestamp.match(/\d{1,2}:\d{2}:\d{2}/);
                        let dateMatch = item.timestamp.match(/\d{1,2}\/\d{1,2}/);

                        let fullTime = timeMatch ? timeMatch[0] : 'Now';
                        let shortDate = dateMatch ? dateMatch[0] : '';
                        
                        let timeLabel = (index === recentData.length - 1) ? "Now" : fullTime;

                        const div = document.createElement('div');
                        div.className = 'timeline-item';
                        div.innerHTML = `
                            <div class="t-time-box">
                                <div class="t-time">${timeLabel}</div>
                                <div class="t-date">${shortDate}</div>
                            </div>
                            <div class="t-temp"><span class="t-icon">☁️</span> ${item.temp}°</div>
                            <div class="t-hum">💧 ${item.hum}%</div>
                        `;
                        timelineContainer.appendChild(div);
                    });
                }
            } catch (error) {
                console.error("Lỗi khi tải dữ liệu:", error);
            }
        }

        setInterval(fetchData, 5000);
        fetchData();
    </script>
</body>
</html>
