<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirSENSE Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f6; padding: 20px; }
        .cards { display: flex; gap: 20px; margin-bottom: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); flex: 1; text-align: center; }
        h1 { text-align: center; color: #333; }
        .value { font-size: 2em; font-weight: bold; color: #2c3e50; }
        .chart-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <h1>Trạm Quan Trắc Không Khí</h1>
    <div class="cards">
        <div class="card"><h3>PM2.5</h3><div class="value" id="pm25Val">--</div></div>
        <div class="card"><h3>PM10</h3><div class="value" id="pm10Val">--</div></div>
        <div class="card"><h3>Nhiệt độ</h3><div class="value" id="tempVal">--</div></div>
        <div class="card"><h3>Độ ẩm</h3><div class="value" id="humVal">--</div></div>
    </div>
    <div class="chart-container">
        <canvas id="myChart"></canvas>
    </div>

    <script>
        const ctx = document.getElementById('myChart').getContext('2d');
        const myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    { label: 'PM2.5', data: [], borderColor: 'red', tension: 0.1 },
                    { label: 'PM10', data: [], borderColor: 'orange', tension: 0.1 }
                ]
            }
        });

        async function fetchData() {
            try {
                const response = await fetch('/api/data');
                const data = await response.json();
                
                if (data.length > 0) {
                    const latest = data[data.length - 1];
                    document.getElementById('pm25Val').innerText = latest.pm25;
                    document.getElementById('pm10Val').innerText = latest.pm10;
                    document.getElementById('tempVal').innerText = latest.temp + " °C";
                    document.getElementById('humVal').innerText = latest.hum + " %";

                    myChart.data.labels = data.map(d => d.timestamp);
                    myChart.data.datasets[0].data = data.map(d => d.pm25);
                    myChart.data.datasets[1].data = data.map(d => d.pm10);
                    myChart.update();
                }
            } catch (error) {
                console.error("Error fetching data:", error);
            }
        }

        setInterval(fetchData, 5000);
        fetchData();
    </script>
</body>
</html>
