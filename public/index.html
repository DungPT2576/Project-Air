<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Data</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #1e2025; 
            color: #ffffff; 
            padding: 20px; 
            margin: 0;
        }
        h1 { text-align: center; color: #f0f0f0; margin-bottom: 30px; font-weight: 500;}

        .weather-timeline {
            background: linear-gradient(180deg, #373b44 0%, #272a31 100%);
            border-radius: 15px;
            padding: 25px 20px;
            display: flex;
            justify-content: space-between; /* Thêm dòng này để dàn đều sang 2 bên mép */
            overflow-x: auto;
            /* Đã xóa dòng gap: 40px; ở đây để trình duyệt tự động chia khoảng cách */
            margin-bottom: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        
        .timeline-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1; /* Thêm dòng này để các cột tự co giãn lấp đầy 100% không gian */
            min-width: 60px;
        }

        .weather-timeline::-webkit-scrollbar { display: none; } 
        .t-time-box { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin-bottom: 15px; 
        }
        .t-time { 
            font-size: 15px; 
            color: #b0b3b8; 
            font-weight: bold; 
        }
        .t-date { 
            font-size: 12px; 
            color: #7a7e85; /* Màu xám nhạt hơn để làm nền cho Giờ */
            margin-top: 3px; 
        }
        .t-temp { font-size: 22px; font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; gap: 5px; color: #fff;}
        .t-icon { color: #64b5f6; font-size: 20px; }
        .t-hum { font-size: 14px; color: #9e9e9e; display: flex; align-items: center; gap: 5px; font-weight: 500;}

        .charts-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
        }
        .chart-box {
            background-color: #272a31;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .chart-title {
            text-align: center;
            color: #b0b3b8;
            margin-bottom: 15px;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
        }
        canvas { width: 100% !important; max-height: 250px; }

    </style>
</head>
<body>

    <h1>Theo Dõi Không Khí Thời Gian Thực</h1>

    <div class="weather-timeline" id="timeline-container">
        <div style="color: #888; width: 100%; text-align: center;">Đang chờ dữ liệu từ thiết bị...</div>
    </div>

    <div class="charts-container">
        <div class="chart-box">
            <div class="chart-title">Chỉ số bụi mịn PM2.5 & PM10 (µg/m³)</div>
            <canvas id="pmChart"></canvas>
        </div>
        
        <div class="chart-box">
            <div class="chart-title">Nhiệt độ (°C)</div>
            <canvas id="tempChart"></canvas>
        </div>

        <div class="chart-box">
            <div class="chart-title">Độ ẩm (%)</div>
            <canvas id="humChart"></canvas>
        </div>
    </div>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script>
        Chart.defaults.color = '#b0b3b8';
        Chart.defaults.borderColor = '#3a3f4a';

        // Khởi tạo 3 biểu đồ (giữ nguyên cấu trúc cũ)
        const pmChart = new Chart(document.getElementById('pmChart').getContext('2d'), { type: 'line', data: { labels: [], datasets: [{ label: 'PM2.5', data: [], borderColor: '#ff5252', backgroundColor: 'rgba(255, 82, 82, 0.1)', tension: 0.3, fill: true }, { label: 'PM10', data: [], borderColor: '#ff9800', backgroundColor: 'rgba(255, 152, 0, 0.1)', tension: 0.3, fill: true }]}, options: { responsive: true, maintainAspectRatio: false } });
        const tempChart = new Chart(document.getElementById('tempChart').getContext('2d'), { type: 'line', data: { labels: [], datasets: [{ label: 'Nhiệt độ (°C)', data: [], borderColor: '#ffeb3b', backgroundColor: 'rgba(255, 235, 59, 0.1)', tension: 0.4, fill: true }]}, options: { responsive: true, maintainAspectRatio: false } });
        const humChart = new Chart(document.getElementById('humChart').getContext('2d'), { type: 'line', data: { labels: [], datasets: [{ label: 'Độ ẩm (%)', data: [], borderColor: '#00e5ff', backgroundColor: 'rgba(0, 229, 255, 0.1)', tension: 0.4, fill: true }]}, options: { responsive: true, maintainAspectRatio: false } });

        // Mảng lưu trữ dữ liệu cục bộ trên web (Tối đa 8 phần tử)
        let dataHistory = [];
        const timelineContainer = document.getElementById('timeline-container');

        // KẾT NỐI MQTT QUA WEBSOCKETS
        const mqttClient = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
        const myTopic = 'airsense/hust/tram_01'; // Chủ đề (Topic) để lắng nghe

        mqttClient.on('connect', () => {
            console.log('✅ Đã kết nối MQTT Broker!');
            mqttClient.subscribe(myTopic);
            timelineContainer.innerHTML = '<div style="color: #888; width: 100%; text-align: center;">Đã kết nối trực tiếp đến ESP32. Đang chờ dữ liệu...</div>';
        });

        mqttClient.on('message', (topic, message) => {
            // Khi có dữ liệu mới từ ESP32 đẩy tới
            const payload = JSON.parse(message.toString());
            
            // Tạo mốc thời gian thực
            const now = new Date();
            const timeStr = now.toTimeString().split(' ')[0]; // Giờ:Phút:Giây
            const dateStr = `${now.getDate()}/${now.getMonth() + 1}`; // Ngày/Tháng
            
            payload.timeLabel = timeStr;
            payload.dateLabel = dateStr;

            // Thêm vào mảng và giới hạn 8 phần tử
            dataHistory.push(payload);
            if (dataHistory.length > 8) dataHistory.shift();

            // CẬP NHẬT BIỂU ĐỒ
            const labels = dataHistory.map(d => d.timeLabel.substring(0, 5)); // Chỉ lấy Giờ:Phút cho biểu đồ
            
            pmChart.data.labels = labels;
            pmChart.data.datasets[0].data = dataHistory.map(d => d.pm25);
            pmChart.data.datasets[1].data = dataHistory.map(d => d.pm10);
            pmChart.update();

            tempChart.data.labels = labels;
            tempChart.data.datasets[0].data = dataHistory.map(d => d.temp);
            tempChart.update();

            humChart.data.labels = labels;
            humChart.data.datasets[0].data = dataHistory.map(d => d.hum);
            humChart.update();

            // CẬP NHẬT THANH TIMELINE
            timelineContainer.innerHTML = ''; 
            dataHistory.forEach((item, index) => {
                let isNow = (index === dataHistory.length - 1);
                let timeDisplay = isNow ? "Now" : item.timeLabel;

                const div = document.createElement('div');
                div.className = 'timeline-item';
                div.innerHTML = `
                    <div class="t-time-box">
                        <div class="t-time">${timeDisplay}</div>
                        <div class="t-date">${item.dateLabel}</div>
                    </div>
                    <div class="t-temp"><span class="t-icon">☁️</span> ${item.temp}°</div>
                    <div class="t-hum">💧 ${item.hum}%</div>
                `;
                timelineContainer.appendChild(div);
            });
        });
    </script>
</body>
</html>
