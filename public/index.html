<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirSense - Hệ Thống Quan Trắc Không Khí</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        :root {
            /* Tông màu sáng (Light Mode) */
            --bg-main: #f0f2f5; /* Nền tổng thể màu xám cực nhạt giúp dịu mắt */
            --bg-card: #ffffff; /* Nền các thẻ box màu trắng tinh */
            --text-main: #1e293b; /* Chữ chính màu xám đen đậm */
            --text-sub: #64748b; /* Chữ phụ/chú thích màu xám vừa */
            --border: #e2e8f0; /* Màu viền thẻ nhạt */
            
            /* Màu cảnh báo chuẩn IQAir (Giữ nguyên vì mang tính tiêu chuẩn) */
            --aqi-good: #10b981;
            --aqi-mod: #f59e0b;
            --aqi-unhealthy-sub: #f97316;
            --aqi-bad: #ef4444;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 24px;
        }

        .dashboard {
            max-width: 1280px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* Top Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border);
            padding-bottom: 16px;
        }
        .header h1 { margin: 0; font-size: 24px; font-weight: 700; letter-spacing: -0.5px; color: #0f172a; }
        .status-badge { padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; background: #e2e8f0; color: #475569; }

        /* Khối tổng quan kiểu IQAir */
        .main-overview {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 24px;
        }

        @media (max-width: 768px) {
            .main-overview { grid-template-columns: 1fr; }
        }

        .aqi-banner {
            border-radius: 16px;
            padding: 32px;
            color: #ffffff; /* Chữ trong banner luôn trắng để nổi trên nền màu cảnh báo */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: all 0.5s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .aqi-value { font-size: 64px; font-weight: 800; line-height: 1; margin: 12px 0; }
        .aqi-label { font-size: 20px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .aqi-desc { font-size: 14px; opacity: 0.95; margin-top: 8px; font-weight: 500; }

        /* Lưới thẻ chỉ số phụ */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        .stat-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05); /* Đổ bóng nhẹ giúp box nổi lên */
        }
        .stat-title { font-size: 14px; color: var(--text-sub); font-weight: 600; }
        .stat-value { font-size: 28px; font-weight: 800; margin-top: 8px; color: var(--text-main); }
        .stat-unit { font-size: 14px; color: var(--text-sub); font-weight: 500; }

        /* Đồ thị */
        .charts-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 20px;
        }
        .chart-container {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            height: 260px;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
        }

        /* Lịch sử dạng Timeline */
        .history-section {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
        }
        .history-section h3 { margin: 0 0 16px 0; font-size: 16px; font-weight: 700; color: var(--text-main); }
        .timeline-scroll { overflow-x: auto; display: flex; gap: 12px; padding-bottom: 8px; }
        .timeline-card {
            background: #f8fafc; /* Màu xám siêu nhạt cho timeline card */
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 16px;
            min-width: 110px;
            flex-shrink: 0;
            text-align: center;
        }
        .tl-time { font-weight: 700; font-size: 14px; color: var(--text-main); }
        .tl-date { font-size: 11px; color: var(--text-sub); margin-bottom: 6px; font-weight: 500; }
        .tl-param { font-size: 13px; margin-top: 4px; font-weight: 600; }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="header">
            <h1>AirSense // Trạm Quan Trắc Đô Thị</h1>
            <div class="status-badge" id="status">Đang kết nối mạng...</div>
        </div>

        <div class="main-overview">
            <div class="aqi-banner" id="aqi-card" style="background-color: var(--border);">
                <div class="aqi-label" id="aqi-status">Đang tải</div>
                <div class="aqi-value" id="aqi-num">--</div>
                <div class="aqi-desc" id="aqi-advice">Đang phân tích chất lượng không khí tại trạm...</div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-title">Bụi mịn PM2.5</div>
                    <div class="stat-value" id="val-pm25">-- <span class="stat-unit">µg/m³</span></div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">Bụi thô PM10</div>
                    <div class="stat-value" id="val-pm10">-- <span class="stat-unit">µg/m³</span></div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">Nhiệt độ môi trường</div>
                    <div class="stat-value" id="val-temp" style="color: #f59e0b;">-- <span class="stat-unit">°C</span></div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">Độ ẩm tương đối</div>
                    <div class="stat-value" id="val-hum" style="color: #0ea5e9;">-- <span class="stat-unit">%</span></div>
                </div>
            </div>
        </div>

        <div class="charts-section">
            <div class="chart-container"><canvas id="pmChart"></canvas></div>
            <div class="chart-container"><canvas id="tempChart"></canvas></div>
            <div class="chart-container"><canvas id="humChart"></canvas></div>
        </div>

        <div class="history-section">
            <h3>⏱️ Dữ liệu đo cuốn chiếu (8 mốc gần nhất)</h3>
            <div class="timeline-scroll" id="timeline">
                </div>
        </div>
    </div>

    <script>
        Chart.defaults.color = '#64748b'; 
        Chart.defaults.borderColor = '#e2e8f0'; 

        const pmChart = new Chart(document.getElementById('pmChart').getContext('2d'), { type: 'line', data: { labels: [], datasets: [{ label: 'PM2.5', data: [], borderColor: '#ef4444', backgroundColor: 'rgba(239, 68, 68, 0.1)', tension: 0.4, fill: true }, { label: 'PM10', data: [], borderColor: '#f59e0b', backgroundColor: 'rgba(245, 158, 11, 0.1)', tension: 0.4, fill: true }]}, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top' } } } });
        const tempChart = new Chart(document.getElementById('tempChart').getContext('2d'), { type: 'line', data: { labels: [], datasets: [{ label: 'Nhiệt độ (°C)', data: [], borderColor: '#f59e0b', backgroundColor: 'transparent', tension: 0.4 }]}, options: { responsive: true, maintainAspectRatio: false } });
        const humChart = new Chart(document.getElementById('humChart').getContext('2d'), { type: 'line', data: { labels: [], datasets: [{ label: 'Độ ẩm (%)', data: [], borderColor: '#0ea5e9', backgroundColor: 'transparent', tension: 0.4 }]}, options: { responsive: true, maintainAspectRatio: false } });

        let dataHistory = [];
        const timeline = document.getElementById('timeline');
        const statusText = document.getElementById('status');

        function renderUI() {
            if (dataHistory.length === 0) return;
            
            const latest = dataHistory[dataHistory.length - 1];
            
            // Ép kiểu an toàn (Number) để chống sập giao diện nếu dữ liệu bị nhiễu
            const p25 = Number(latest.pm25 || 0);
            const p10 = Number(latest.pm10 || 0);
            const tmp = Number(latest.temp || 0);
            const hum = Number(latest.hum || 0);

            document.getElementById('val-pm25').innerHTML = `${p25.toFixed(1)} <span class="stat-unit">µg/m³</span>`;
            document.getElementById('val-pm10').innerHTML = `${p10.toFixed(1)} <span class="stat-unit">µg/m³</span>`;
            document.getElementById('val-temp').innerHTML = `${tmp.toFixed(1)} <span class="stat-unit">°C</span>`;
            document.getElementById('val-hum').innerHTML = `${hum.toFixed(1)} <span class="stat-unit">%</span>`;
            
            const card = document.getElementById('aqi-card');
            const status = document.getElementById('aqi-status');
            const num = document.getElementById('aqi-num');
            const advice = document.getElementById('aqi-advice');
            
            num.innerText = Math.round(p25);
            if (p25 <= 12.0) { card.style.backgroundColor = 'var(--aqi-good)'; status.innerText = 'Tốt (Good)'; advice.innerText = 'Không khí trong lành. Thích hợp cho mọi hoạt động ngoài trời.'; }
            else if (p25 <= 35.4) { card.style.backgroundColor = 'var(--aqi-mod)'; status.innerText = 'Khá (Moderate)'; advice.innerText = 'Nhóm nhạy cảm nên cân nhắc giảm bớt thời gian vận động ngoài trời.'; }
            else if (p25 <= 55.4) { card.style.backgroundColor = 'var(--aqi-unhealthy-sub)'; status.innerText = 'Kém (Unhealthy)'; advice.innerText = 'Chỉ số không khí suy giảm. Người dân nên trang bị khẩu trang chống bụi mịn.'; }
            else { card.style.backgroundColor = 'var(--aqi-bad)'; status.innerText = 'Xấu (Hazardous)'; advice.innerText = 'Bắt đầu ảnh hưởng xấu tới sức khỏe cộng đồng. Hạn chế ra đường.'; }

            const labels = dataHistory.map(d => (d.timeLabel || "").substring(0, 5));
            pmChart.data.labels = labels; pmChart.data.datasets[0].data = dataHistory.map(d => d.pm25); pmChart.data.datasets[1].data = dataHistory.map(d => d.pm10); pmChart.update();
            tempChart.data.labels = labels; tempChart.data.datasets[0].data = dataHistory.map(d => d.temp); tempChart.update();
            humChart.data.labels = labels; humChart.data.datasets[0].data = dataHistory.map(d => d.hum); humChart.update();

            timeline.innerHTML = '';
            const recent = dataHistory.slice(-8);
            recent.forEach((item, index) => {
                let displayTime = (index === recent.length - 1) ? "Bây giờ" : (item.timeLabel || "").substring(0, 5);
                const div = document.createElement('div');
                div.className = 'timeline-card';
                div.innerHTML = `
                    <div class="tl-time">${displayTime}</div>
                    <div class="tl-date">${item.dateLabel || ""}</div>
                    <div class="tl-param" style="color: #ef4444;">🌫️ ${Math.round(item.pm25)}</div>
                    <div class="tl-param" style="color: #f59e0b;">🌡️ ${Math.round(item.temp)}°</div>
                `;
                timeline.appendChild(div);
            });
        }

        async function loadHistory() {
            try {
                const response = await fetch('/api/data');
                const history = await response.json();
                if (history && history.length > 0) {
                    dataHistory = history;
                    renderUI();
                }
            } catch (e) { console.error("Lỗi đồng bộ API lịch sử:", e); }
        }

        // TẠO CLIENT ID NGẪU NHIÊN ĐỂ TRÁNH BỊ BROKER KÍCH RA NGOÀI
        const uniqueClientId = 'web_' + Math.random().toString(16).substring(2, 10);
        
        // Đã đổi sang cổng 8084 của EMQX
        const mqttClient = mqtt.connect('wss://broker.emqx.io:8084/mqtt', {
            clientId: uniqueClientId,
            clean: true,
            connectTimeout: 4000,
            reconnectPeriod: 1000,
        });

        const myTopicUI = 'airsense/hust/tiendung_01'; 

        mqttClient.on('connect', () => {
            console.log("✅ Giao diện đã kết nối thành công với MQTT Broker!");
            statusText.innerText = "Trạng thái trực tuyến: MQTT Real-time 🟢";
            statusText.style.background = "#dcfce7"; 
            statusText.style.color = "#166534"; 
            mqttClient.subscribe(myTopicUI);
        });

        // Thêm khối bắt lỗi mạng để Console hiện thông báo nếu bị chặn
        mqttClient.on('error', (err) => {
            console.error("⚠️ Lỗi kết nối MQTT:", err);
        });

        mqttClient.on('message', (topic, message) => {
            try {
                const payload = JSON.parse(message.toString());
                console.log("📥 Đã nhận dữ liệu Real-time mới:", payload);
                
                const now = new Date();
                payload.timeLabel = now.toLocaleTimeString('vi-VN', { hour12: false });
                payload.dateLabel = `${now.getDate()}/${now.getMonth() + 1}/${now.getFullYear()}`;
                
                dataHistory.push(payload);
                if (dataHistory.length > 50) dataHistory.shift(); 
                
                renderUI(); 
            } catch (error) {
                console.error("⚠️ Lỗi phân tích gói tin:", error);
            }
        });

        // Khởi động
        loadHistory();
    </script>
</body>
</html>
