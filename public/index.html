<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirSense Dashboard - Trạm Quan Trắc</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        /* GIỮ NGUYÊN CSS CŨ CỦA BẠN VÀO ĐÂY */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #18191a; color: #e4e6eb; margin: 0; padding: 20px; }
        .dashboard-container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .chart-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .chart-card { background-color: #242526; padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); height: 300px; }
        .timeline-wrapper { background-color: #242526; padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); overflow-x: auto; white-space: nowrap; }
        .timeline-container { display: flex; gap: 15px; }
        .timeline-item { background: #3a3b3c; padding: 10px 15px; border-radius: 8px; min-width: 120px; display: inline-block; }
        .t-time-box { border-bottom: 1px solid #555; padding-bottom: 5px; margin-bottom: 8px; }
        .t-time { font-weight: bold; font-size: 1.1em; color: #fff; }
        .t-date { font-size: 0.8em; color: #aaa; }
        .t-temp { color: #ffeb3b; margin-bottom: 5px; }
        .t-hum { color: #00e5ff; }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <h2>🌍 HỆ THỐNG QUAN TRẮC MÔI TRƯỜNG IOT</h2>
            <p style="color: #4caf50;" id="connection-status">Trạng thái: Đang kết nối...</p>
        </div>

        <div class="chart-grid">
            <div class="chart-card"><canvas id="pmChart"></canvas></div>
            <div class="chart-card"><canvas id="tempChart"></canvas></div>
            <div class="chart-card"><canvas id="humChart"></canvas></div>
        </div>

        <div class="timeline-wrapper">
            <h3>⏱️ Luồng dữ liệu gần nhất</h3>
            <div class="timeline-container" id="timeline-container">
                </div>
        </div>
    </div>

    <script>
        // CẤU HÌNH MÀU SẮC MẶC ĐỊNH CHO BIỂU ĐỒ CHART.JS
        Chart.defaults.color = '#b0b3b8';
        Chart.defaults.borderColor = '#3a3f4a';

        // KHỞI TẠO 3 BIỂU ĐỒ
        const pmChart = new Chart(document.getElementById('pmChart').getContext('2d'), { type: 'line', data: { labels: [], datasets: [{ label: 'PM2.5', data: [], borderColor: '#ff5252', backgroundColor: 'rgba(255, 82, 82, 0.1)', tension: 0.3, fill: true }, { label: 'PM10', data: [], borderColor: '#ff9800', backgroundColor: 'rgba(255, 152, 0, 0.1)', tension: 0.3, fill: true }]}, options: { responsive: true, maintainAspectRatio: false } });
        const tempChart = new Chart(document.getElementById('tempChart').getContext('2d'), { type: 'line', data: { labels: [], datasets: [{ label: 'Nhiệt độ (°C)', data: [], borderColor: '#ffeb3b', backgroundColor: 'rgba(255, 235, 59, 0.1)', tension: 0.4, fill: true }]}, options: { responsive: true, maintainAspectRatio: false } });
        const humChart = new Chart(document.getElementById('humChart').getContext('2d'), { type: 'line', data: { labels: [], datasets: [{ label: 'Độ ẩm (%)', data: [], borderColor: '#00e5ff', backgroundColor: 'rgba(0, 229, 255, 0.1)', tension: 0.4, fill: true }]}, options: { responsive: true, maintainAspectRatio: false } });

        let dataHistory = [];
        const timelineContainer = document.getElementById('timeline-container');
        const statusText = document.getElementById('connection-status');

        // ==========================================
        // HÀM VẼ LẠI GIAO DIỆN (Dùng chung cho cả API và MQTT)
        // ==========================================
        function renderUI() {
            if(dataHistory.length === 0) return;
            
            // Cập nhật biểu đồ (Lấy giờ phút)
            const labels = dataHistory.map(d => d.timeLabel.substring(0, 5));
            
            pmChart.data.labels = labels; 
            pmChart.data.datasets[0].data = dataHistory.map(d => d.pm25); 
            pmChart.data.datasets[1].data = dataHistory.map(d => d.pm10); 
            pmChart.update();
            
            tempChart.data.labels = labels; 
            tempChart.data.datasets[0].data = dataHistory.map(d => d.temp); 
            tempChart.update();
            
            humChart.data.labels = labels; 
            humChart.data.datasets[0].data = dataHistory.map(d => d.hum); 
            humChart.update();

            // Cập nhật thanh Timeline (Hiển thị 8 điểm gần nhất)
            timelineContainer.innerHTML = ''; 
            const recentData = dataHistory.slice(-8); 
            recentData.forEach((item, index) => {
                let timeDisplay = (index === recentData.length - 1) ? "Now" : item.timeLabel;
                const div = document.createElement('div'); 
                div.className = 'timeline-item';
                div.innerHTML = `
                    <div class="t-time-box">
                        <div class="t-time">${timeDisplay}</div>
                        <div class="t-date">${item.dateLabel}</div>
                    </div>
                    <div class="t-temp"><span class="t-icon">☁️</span> ${item.temp}°C</div>
                    <div class="t-hum">💧 ${item.hum}%</div>
                `;
                timelineContainer.appendChild(div);
            });
        }

        // ==========================================
        // BƯỚC 1: TẢI LỊCH SỬ TỪ SERVER KHI MỞ TRANG
        // ==========================================
        async function loadHistory() {
            try {
                const response = await fetch('/api/data');
                const history = await response.json();
                if(history && history.length > 0) {
                    dataHistory = history;
                    renderUI();
                } else {
                    timelineContainer.innerHTML = '<div style="color: #888; width: 100%; text-align: center;">Chưa có dữ liệu. Đang chờ ESP32 gửi lên...</div>';
                }
            } catch(e) { console.error("Lỗi lấy lịch sử:", e); }
        }

        // ==========================================
        // BƯỚC 2: KẾT NỐI MQTT QUA WEBSOCKETS (REAL-TIME)
        // ==========================================
        const mqttClient = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
        const myTopicUI = 'airsense/hust/tiendung_2507'; // Đã đồng bộ Topic mới

        mqttClient.on('connect', () => {
            statusText.innerText = "Trạng thái: Đã kết nối MQTT Real-time 🟢";
            statusText.style.color = "#4caf50";
            mqttClient.subscribe(myTopicUI);
        });

        mqttClient.on('message', (topic, message) => {
            const payload = JSON.parse(message.toString());
            const now = new Date();
            
            // Xử lý múi giờ và nhãn thời gian trên trình duyệt
            payload.timeLabel = now.toLocaleTimeString('vi-VN', { hour12: false });
            payload.dateLabel = now.toLocaleDateString('vi-VN');
            
            dataHistory.push(payload);
            if (dataHistory.length > 50) dataHistory.shift(); // Giữ tối đa 50 điểm
            renderUI();
        });

        // Chạy ngay khi tải trang
        loadHistory();
    </script>
</body>
</html>
